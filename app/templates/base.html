<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#07080f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <title>{% block title %}InvoiCzech{% endblock %} — InvoiCzech</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <!-- Topbar -->
  <header class="topbar">
    <a href="/" class="logo-wordmark">
      <span class="logo-invoi">Invoi</span><span class="logo-czech">Czech</span>
    </a>
    <div class="topbar-search">
      <input type="text" class="topbar-search-input" placeholder="Hledat...">
    </div>
    <div class="topbar-right"></div>
  </header>

  <div class="layout">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-user" id="sidebar-user">
        <div class="user-toggle" onclick="document.getElementById('sidebar-user').classList.toggle('open')">
          <div class="user-avatar">SW</div>
          <div class="user-info">
            <div class="user-name">Samuel Wlaschinský</div>
            <div class="user-email">samuel@invoiczech.cz</div>
          </div>
          <span class="user-chevron">›</span>
        </div>
        <div class="user-dropdown" id="user-dropdown">
          <a href="/odhlaseni" class="user-dropdown-item">Odhlásit se</a>
        </div>
      </div>
      <hr class="sidebar-separator">
      <ul class="nav-list">
        <li class="nav-item">
          <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">
            <span class="nav-icon">⬜</span> Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a href="/faktury" class="nav-link {% if '/faktury' in request.url.path %}active{% endif %}">
            <span class="nav-icon">◧</span> Faktury
          </a>
        </li>
        <li class="nav-item">
          <a href="/naklady" class="nav-link {% if '/naklady' in request.url.path %}active{% endif %}">
            <span class="nav-icon">◨</span> Náklady
          </a>
        </li>
        <li class="nav-item">
          <a href="/adresar" class="nav-link {% if '/adresar' in request.url.path %}active{% endif %}">
            <span class="nav-icon">◫</span> Adresář
          </a>
        </li>
        <li class="nav-item">
          <a href="/exporty" class="nav-link {% if '/exporty' in request.url.path %}active{% endif %}">
            <span class="nav-icon">◪</span> DPH exporty
          </a>
        </li>
      </ul>
    </nav>

    <!-- Main content -->
    <main class="main-content">
      <div class="content-inner">
        {% for flash in flashes %}
        <div class="alert alert-{{ flash.category }}">{{ flash.message }}</div>
        {% endfor %}
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>

  <script>
    // Registrace Service Workeru pro PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js').catch(() => {});
    }
    // Close user dropdown on outside click
    document.addEventListener('click', function(e) {
      const su = document.getElementById('sidebar-user');
      if (!su) return;
      if (!e.target.closest('.sidebar-user')) {
        su.classList.remove('open');
      }
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
