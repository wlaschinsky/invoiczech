<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#07080f">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <title>Přihlášení — InvoiCzech</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo"><span class="brand-invoi">Invoi</span><span class="brand-dot">·</span><span class="brand-czech">Czech</span></div>
        <p>{{ settings.OWNER_NAME }}</p>
      </div>

      {% if flashes is defined %}
      {% for flash in flashes %}
      <div class="alert alert-{{ flash.category }}">{{ flash.message }}</div>
      {% endfor %}
      {% endif %}

      <form method="post" action="/prihlaseni" class="login-form">
        <div class="form-group">
          <label for="password">Heslo</label>
          <input type="password" id="password" name="password"
                 placeholder="Zadejte heslo" required autofocus
                 class="form-control" data-testid="login-password">
        </div>
        <button type="submit" class="btn btn-primary btn-full" data-testid="login-submit">Přihlásit se</button>
      </form>
    </div>
  </div>
  <footer class="app-footer app-footer--login">
    <span class="footer-left"><span class="brand-invoi">Invoi</span><span class="brand-dot">·</span><span class="brand-czech">Czech</span> <span class="footer-version">{{ app_version }}</span></span>
    <a href="https://github.com/wlaschinsky/invoiczech" class="footer-link" target="_blank" rel="noopener" title="GitHub">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
    </a>
  </footer>
</body>
</html>
